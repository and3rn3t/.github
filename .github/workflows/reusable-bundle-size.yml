# Reusable bundle size report — comments on PRs with the compressed-size diff
# for a Vite/Node build. Report-only by default (never fails the build); the
# consuming repo can add a size budget later once it has a baseline.
#
#   jobs:
#     bundle-size:
#       uses: and3rn3t/.github/.github/workflows/reusable-bundle-size.yml@main
#       with:
#         build-script: build
#         pattern: "dist/**/*.{js,css}"
#         package-manager: npm

name: Reusable Bundle Size

on:
  workflow_call:
    inputs:
      build-script:
        description: npm/pnpm script that produces the build output.
        required: false
        default: build
        type: string
      pattern:
        description: Glob (relative to repo root) of files to measure.
        required: false
        default: "dist/**/*.{js,css}"
        type: string
      package-manager:
        description: npm or pnpm (controls install + cache).
        required: false
        default: npm
        type: string
      node-version-file:
        description: File to read the Node version from.
        required: false
        default: .nvmrc
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'pnpm' && 'pnpm install --frozen-lockfile' || 'npm ci' }}
        env:
          HUSKY: 0
      - name: Compressed size report
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ github.token }}
          build-script: ${{ inputs.build-script }}
          pattern: ${{ inputs.pattern }}
          install-script: "echo already installed"
