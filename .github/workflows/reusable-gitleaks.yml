# Reusable secret scan — call on push/pull_request:
#
#   jobs:
#     gitleaks:
#       uses: and3rn3t/.github/.github/workflows/reusable-gitleaks.yml@main

name: Reusable Gitleaks

on:
  workflow_call: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
