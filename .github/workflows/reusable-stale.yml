# Reusable stale-issue/PR closer. Marks issues/PRs stale after inactivity,
# closes them after further inactivity. Exempts anything labeled "pinned" or
# "security" by default.
#
#   jobs:
#     stale:
#       uses: and3rn3t/.github/.github/workflows/reusable-stale.yml@main

name: Reusable Stale

on:
  workflow_call:
    inputs:
      days-before-stale:
        required: false
        default: 60
        type: number
      days-before-close:
        required: false
        default: 14
        type: number
      exempt-labels:
        description: Comma-separated labels that are never marked stale.
        required: false
        default: pinned,security
        type: string

permissions: {}

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          exempt-issue-labels: ${{ inputs.exempt-labels }}
          exempt-pr-labels: ${{ inputs.exempt-labels }}
          stale-issue-message: >
            This issue has had no activity for ${{ inputs.days-before-stale }} days
            and will be closed in ${{ inputs.days-before-close }} days if nothing changes.
          stale-pr-message: >
            This PR has had no activity for ${{ inputs.days-before-stale }} days
            and will be closed in ${{ inputs.days-before-close }} days if nothing changes.
